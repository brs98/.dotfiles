id = "brs98.compact-labels"
name = "Compact Labels"
version = "0.2.1"
min_herdr_version = "0.7.0"
description = "Keep workspace, tab, and agent labels compact and jump-key numbered"
platforms = ["macos", "linux"]

[[events]]
on = "workspace.created"
command = ["/bin/sh", "scripts/normalize-labels.sh"]

[[events]]
on = "workspace.updated"
command = ["/bin/sh", "scripts/normalize-labels.sh"]

[[events]]
on = "workspace.moved"
command = ["/bin/sh", "scripts/normalize-labels.sh"]

[[events]]
on = "workspace.closed"
command = ["/bin/sh", "scripts/normalize-labels.sh"]

[[events]]
on = "workspace.focused"
command = ["/bin/sh", "scripts/normalize-labels.sh"]

[[events]]
on = "tab.created"
command = ["/bin/sh", "scripts/normalize-labels.sh"]

[[events]]
on = "tab.moved"
command = ["/bin/sh", "scripts/normalize-labels.sh"]

[[events]]
on = "tab.closed"
command = ["/bin/sh", "scripts/normalize-labels.sh"]

[[events]]
on = "tab.focused"
command = ["/bin/sh", "scripts/normalize-labels.sh"]

[[events]]
on = "pane.created"
command = ["/bin/sh", "scripts/normalize-labels.sh"]

[[events]]
on = "pane.agent_detected"
command = ["/bin/sh", "scripts/normalize-labels.sh"]

[[events]]
on = "pane.closed"
command = ["/bin/sh", "scripts/normalize-labels.sh"]

[[events]]
on = "pane.moved"
command = ["/bin/sh", "scripts/normalize-labels.sh"]

[[events]]
on = "worktree.created"
command = ["/bin/sh", "scripts/normalize-labels.sh"]

[[events]]
on = "worktree.opened"
command = ["/bin/sh", "scripts/normalize-labels.sh"]

[[events]]
on = "worktree.removed"
command = ["/bin/sh", "scripts/normalize-labels.sh"]
