# Optional theme — ricekit on macOS, omarchy on Linux (last loaded wins)
source-file -q ~/.config/tmux/ricekit-colors.conf
source-file -q ~/.config/omarchy/current/theme/tmux.conf

# Shell — use default $SHELL (works on both macOS and Linux)
set-option -g prefix C-b
bind-key C-b send-prefix

# Base settings
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on
set -g escape-time 0
set -g history-limit 10000
set -g default-terminal "tmux-256color"
set -g mouse on
set-option -ga terminal-overrides ',*-256color*:RGB'
setw -g mode-keys vi

# Status bar defaults (theme overrides these via @foreground/@accent when loaded)
set -g status-position bottom
set -g status-left-length 100
set -g status-style default
set -g status-left "#[bold]  #S #[nobold] | "
set -g status-right ""
set -g window-status-current-format "#[bold]  #W"
set -g window-status-format " #I|#W"

# Copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Platform-specific clipboard commands
if-shell "uname | grep -q Darwin" \
    "bind-key -T copy-mode-vi y send-keys -X copy-pipe 'pbcopy'; \
     bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind-key -T copy-mode-vi y send-keys -X copy-pipe 'wl-copy 2>/dev/null || xclip -selection clipboard'; \
     bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy 2>/dev/null || xclip -selection clipboard'"

bind-key -T copy-mode-vi Escape send-keys -X cancel

# Better pane splits
bind-key - split-window -v
bind-key | split-window -h
bind -n C-M-Down split-window -v
bind -n C-M-Right split-window -h
bind -n C-M-x kill-pane
bind -n M-Left if-shell -F '#{pane_at_left}' 'previous-window' 'select-pane -L'
bind -n M-Right if-shell -F '#{pane_at_right}' 'next-window' 'select-pane -R'
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Open panes in current directory
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# Clear screen override for vim-tmux-navigator
bind C-l send-keys 'C-l'

# Better navigation
bind -n M-0 select-window -t 0
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Reload config
bind r source-file ~/.tmux.conf

# User overrides
source-file -q ~/.tmux-overrides.conf
